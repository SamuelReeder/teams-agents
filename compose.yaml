services:
  teams-bot:
    # Build the image with the same UID/GID as the HPE account so mounted
    # home-directory SSH keys keep their normal permissions.
    build:
      context: .
      args:
        APP_USER: ${APP_USER:-sareeder}
        APP_UID: ${APP_UID:-1038}
        APP_GID: ${APP_GID:-1037}
    image: teams-bot:hpe-alola-persistent-sessions
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/${APP_USER:-sareeder}
      PORT: "3978"
      APP_STATE_DIR: /app/state
      APP_LOG_DIR: /app/logs
      APP_SECRETS_DIR: /app/secrets
      AGENT_RUNTIME_HOST: hpe-sjc2-43
      DEPLOYMENT_HOST: hpe-sjc2-43
      ALOLA_USER: sareeder
      ALOLA_LOGIN_NODES: "03,04"
      ALOLA_DEFAULT_LOGIN_NODE: "03"
      ALOLA_DEFAULT_ASIC: gfx90a
      ALOLA_DEFAULT_LOGIN_CONTAINER: sareeder-latest_container
      ALOLA_IMAGE_TEMPLATE: /cluster/images/hipdnn/hipdnn_latest_{asic}.sqsh
      ALOLA_DEFAULT_CONSTRAINT_PREFIX: MARKHAM
      ALOLA_DEFAULT_GPU_TIMEOUT: "08:00:00"
      ALOLA_SSH_KEY: /run/secrets/alola_ssh_key
      ALOLA_SSH_OPTIONS: "-o BatchMode=yes -o StrictHostKeyChecking=yes"
      # The HPE home mount provides the OMP harness installed for the account.
      HARNESS_BIN: ${HARNESS_BIN:-/home/${APP_USER:-sareeder}/.local/bin/omp}
      # OMP provider watchdogs; outer bot timeout remains controlled by AGENT_TIMEOUT.
      PI_STREAM_FIRST_EVENT_TIMEOUT_MS: ${PI_STREAM_FIRST_EVENT_TIMEOUT_MS:-600000}
      PI_STREAM_IDLE_TIMEOUT_MS: ${PI_STREAM_IDLE_TIMEOUT_MS:-600000}
    ports:
      - "3978:3978"
    volumes:
      - teams_state:/app/state
      - teams_logs:/app/logs
      # Mount the HPE home directory so SSH/Git use the same keys, config, and
      # known_hosts as the sareeder account on hpe-sjc2-43.
      - /home/${APP_USER:-sareeder}:/home/${APP_USER:-sareeder}
      - ./secrets/alola_ssh_key:/run/secrets/alola_ssh_key:ro
      # The default HARNESS_BIN above uses the OMP install from the mounted HPE home.
    security_opt:
      - no-new-privileges:true
    read_only: false

volumes:
  teams_state:
  teams_logs:
