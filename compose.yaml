x-app-build: &app-build
  context: .
  args:
    BASE_IMAGE: ${BASE_IMAGE:-node:20-bookworm-slim}
    APP_USER: ${APP_USER:-teamsbot}
    APP_UID: ${APP_UID:-1000}
    APP_GID: ${APP_GID:-1000}

services:
  teams-bot:
    build: *app-build
    image: ${TEAMS_BOT_IMAGE:-teams-bot:latest}
    restart: unless-stopped
    depends_on:
      - agent-runner
    environment:
      HOME: /home/${APP_USER:-teamsbot}
      PORT: ${PORT:-3978}
      APP_BIND_HOST: 0.0.0.0
      POLL_INTERVAL: ${POLL_INTERVAL:-5000}
      MAX_AGENTS: ${MAX_AGENTS:-3}
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-3600000}
      THREAD_TTL: ${THREAD_TTL:-604800000}
      AGENT_PREFIX: ${AGENT_PREFIX:-!agent}
      APP_STATE_DIR: /app/state
      APP_LOG_DIR: /app/logs
      APP_SECRETS_DIR: /app/secrets
      APP_WORKSPACE_DIR: ${APP_WORKSPACE_DIR:-/app/workspace}
      TEAMS_SCRIPTS_DIR: ${TEAMS_SCRIPTS_DIR:-${TEAMS_SCRIPT_DIR:-/home/${APP_USER:-teamsbot}/.claude/skills/m365-teams/scripts}}
      TEAMS_REPLY_SCRIPT: /app/scripts/teams/reply.py
      AGENT_RUNNER_URL: ${AGENT_RUNNER_URL-http://agent-runner:${AGENT_RUNNER_PORT:-3979}}
      AGENT_RUNNER_TOKEN: ${AGENT_RUNNER_TOKEN:-}
      HARNESS_BASE_ARGS: ${HARNESS_BASE_ARGS:---print}
      HARNESS_APPEND_SYSTEM_PROMPT: ${HARNESS_APPEND_SYSTEM_PROMPT:-1}
      HARNESS_SKIP_PERMISSIONS: ${HARNESS_SKIP_PERMISSIONS:-1}
      HARNESS_PROMPT_FLAG: ${HARNESS_PROMPT_FLAG--p}
      HARNESS_SESSION_FLAG: ${HARNESS_SESSION_FLAG---session-id}
      HARNESS_SESSION_DIR_FLAG: ${HARNESS_SESSION_DIR_FLAG---session-dir}
      HARNESS_RESUME_FLAG: ${HARNESS_RESUME_FLAG---resume}
      HARNESS_SYSTEM_PROMPT_FLAG: ${HARNESS_SYSTEM_PROMPT_FLAG---append-system-prompt}
      HARNESS_SKIP_PERMISSIONS_FLAG: ${HARNESS_SKIP_PERMISSIONS_FLAG---dangerously-skip-permissions}
      HARNESS_MCP_FLAG: ${HARNESS_MCP_FLAG---mcp-config}
      HARNESS_ADD_DIR_FLAG: ${HARNESS_ADD_DIR_FLAG---add-dir}
      HARNESS_MODEL_FLAG: ${HARNESS_MODEL_FLAG---model}
      HARNESS_LIST_MODELS_FLAG: ${HARNESS_LIST_MODELS_FLAG---list-models}
      HARNESS_DEFAULT_MODEL: ${HARNESS_DEFAULT_MODEL:-}
      ALOLA_HARNESS_DEFAULT_MODEL: ${ALOLA_HARNESS_DEFAULT_MODEL:-}
      ALOLA_USER: ${ALOLA_USER:-remote-user}
      ALOLA_LOGIN_NODES: ${ALOLA_LOGIN_NODES:-01}
      ALOLA_DEFAULT_LOGIN_NODE: ${ALOLA_DEFAULT_LOGIN_NODE:-01}
      ALOLA_DEFAULT_ASIC: ${ALOLA_DEFAULT_ASIC:-gfx000}
      ALOLA_DEFAULT_LOGIN_CONTAINER: ${ALOLA_DEFAULT_LOGIN_CONTAINER:-remote-session}
      ALOLA_IMAGE_TEMPLATE: ${ALOLA_IMAGE_TEMPLATE:-remote_image_{asic}.sqsh}
      ALOLA_DEFAULT_CONSTRAINT_PREFIX: ${ALOLA_DEFAULT_CONSTRAINT_PREFIX:-}
      ALOLA_DEFAULT_GPU_TIMEOUT: ${ALOLA_DEFAULT_GPU_TIMEOUT:-08:00:00}
      ALOLA_GPU_PARTITION: ${ALOLA_GPU_PARTITION:-defq}
      ALOLA_GPU_CPUS_PER_TASK: ${ALOLA_GPU_CPUS_PER_TASK:-16}
      ALOLA_REMOTE_HOME_MOUNT: ${ALOLA_REMOTE_HOME_MOUNT:-/home/remote:/home/remote}
      ALOLA_SESSION_BIN: ${ALOLA_SESSION_BIN:-/app/bin/alola-session}
      DEPLOYMENT_HOST: ${DEPLOYMENT_HOST:-}
      AGENT_RUNTIME_HOST: ${AGENT_RUNTIME_HOST:-}
    ports:
      - "${HOST_BIND_ADDR:-127.0.0.1}:${PORT:-3978}:3978"
    volumes:
      - teams_state:/app/state
      - teams_logs:/app/logs
      - ./config/channels.json:/app/config/channels.json:ro
      - ${HOST_WORKSPACE_DIR:-teams_workspace}:${APP_WORKSPACE_DIR:-/app/workspace}
      - teams_workspace_repos:${APP_WORKSPACE_DIR:-/app/workspace}/repos
      - teams_workspace_worktrees:${APP_WORKSPACE_DIR:-/app/workspace}/worktrees
      - ${HOST_HOME_DIR:-${HOME:-teams_home}}:/home/${APP_USER:-teamsbot}
    security_opt:
      - no-new-privileges:true
    read_only: false

  agent-runner:
    build: *app-build
    image: ${TEAMS_BOT_IMAGE:-teams-bot:latest}
    restart: unless-stopped
    command: ["node", "/app/src/agents/runner-server.js"]
    environment:
      HOME: /home/${APP_USER:-teamsbot}
      APP_STATE_DIR: /app/state
      APP_LOG_DIR: /app/logs
      APP_SECRETS_DIR: /app/secrets
      APP_WORKSPACE_DIR: ${APP_WORKSPACE_DIR:-/app/workspace}
      AGENT_RUNNER_BIND_HOST: 0.0.0.0
      AGENT_RUNNER_PORT: ${AGENT_RUNNER_PORT:-3979}
      AGENT_RUNNER_TOKEN: ${AGENT_RUNNER_TOKEN:-}
      AGENT_RUNNER_ALLOWED_ROOTS: ${AGENT_RUNNER_ALLOWED_ROOTS:-${APP_WORKSPACE_DIR:-/app/workspace}}
      HARNESS_BIN: ${HARNESS_BIN:-omp}
      HARNESS_BASE_ARGS: ${HARNESS_BASE_ARGS:---print}
      HARNESS_APPEND_SYSTEM_PROMPT: ${HARNESS_APPEND_SYSTEM_PROMPT:-1}
      HARNESS_SKIP_PERMISSIONS: ${HARNESS_SKIP_PERMISSIONS:-1}
      HARNESS_PROMPT_FLAG: ${HARNESS_PROMPT_FLAG--p}
      HARNESS_SESSION_FLAG: ${HARNESS_SESSION_FLAG---session-id}
      HARNESS_SESSION_DIR_FLAG: ${HARNESS_SESSION_DIR_FLAG---session-dir}
      HARNESS_RESUME_FLAG: ${HARNESS_RESUME_FLAG---resume}
      HARNESS_SYSTEM_PROMPT_FLAG: ${HARNESS_SYSTEM_PROMPT_FLAG---append-system-prompt}
      HARNESS_SKIP_PERMISSIONS_FLAG: ${HARNESS_SKIP_PERMISSIONS_FLAG---dangerously-skip-permissions}
      HARNESS_MCP_FLAG: ${HARNESS_MCP_FLAG---mcp-config}
      HARNESS_ADD_DIR_FLAG: ${HARNESS_ADD_DIR_FLAG---add-dir}
      HARNESS_MODEL_FLAG: ${HARNESS_MODEL_FLAG---model}
      HARNESS_LIST_MODELS_FLAG: ${HARNESS_LIST_MODELS_FLAG---list-models}
      HARNESS_ENV_PASSTHROUGH: ${HARNESS_ENV_PASSTHROUGH:-}
      HARNESS_DEFAULT_MODEL: ${HARNESS_DEFAULT_MODEL:-}
      ALOLA_HARNESS_DEFAULT_MODEL: ${ALOLA_HARNESS_DEFAULT_MODEL:-}
      ALOLA_USER: ${ALOLA_USER:-remote-user}
      ALOLA_LOGIN_NODES: ${ALOLA_LOGIN_NODES:-01}
      ALOLA_DEFAULT_LOGIN_NODE: ${ALOLA_DEFAULT_LOGIN_NODE:-01}
      ALOLA_DEFAULT_ASIC: ${ALOLA_DEFAULT_ASIC:-gfx000}
      ALOLA_DEFAULT_LOGIN_CONTAINER: ${ALOLA_DEFAULT_LOGIN_CONTAINER:-remote-session}
      ALOLA_IMAGE_TEMPLATE: ${ALOLA_IMAGE_TEMPLATE:-remote_image_{asic}.sqsh}
      ALOLA_DEFAULT_CONSTRAINT_PREFIX: ${ALOLA_DEFAULT_CONSTRAINT_PREFIX:-}
      ALOLA_DEFAULT_GPU_TIMEOUT: ${ALOLA_DEFAULT_GPU_TIMEOUT:-08:00:00}
      ALOLA_SSH_HOST_TEMPLATE: ${ALOLA_SSH_HOST_TEMPLATE:-login-{node}}
      ALOLA_SSH_OPTIONS: ${ALOLA_SSH_OPTIONS:--o BatchMode=yes -o StrictHostKeyChecking=yes}
      ALOLA_GPU_PARTITION: ${ALOLA_GPU_PARTITION:-defq}
      ALOLA_GPU_CPUS_PER_TASK: ${ALOLA_GPU_CPUS_PER_TASK:-16}
      ALOLA_REMOTE_HOME_MOUNT: ${ALOLA_REMOTE_HOME_MOUNT:-/home/remote:/home/remote}
      ALOLA_SSH_TIMEOUT_MS: ${ALOLA_SSH_TIMEOUT_MS:-30000}
      ALOLA_START_TIMEOUT_MS: ${ALOLA_START_TIMEOUT_MS:-60000}
      ALOLA_COMMAND_TIMEOUT_MS: ${ALOLA_COMMAND_TIMEOUT_MS:-1800000}
      ALOLA_SESSION_BIN: ${ALOLA_SESSION_BIN:-/app/bin/alola-session}
      DEPLOYMENT_HOST: ${DEPLOYMENT_HOST:-}
      AGENT_RUNTIME_HOST: ${AGENT_RUNTIME_HOST:-}
      PI_STREAM_FIRST_EVENT_TIMEOUT_MS: ${PI_STREAM_FIRST_EVENT_TIMEOUT_MS:-600000}
      PI_STREAM_IDLE_TIMEOUT_MS: ${PI_STREAM_IDLE_TIMEOUT_MS:-600000}
    expose:
      - "${AGENT_RUNNER_PORT:-3979}"
    volumes:
      - teams_state:/app/state
      - teams_logs:/app/logs
      - ${HOST_SECRETS_DIR:-./secrets}:/app/secrets:ro
      - ${HOST_WORKSPACE_DIR:-teams_workspace}:${APP_WORKSPACE_DIR:-/app/workspace}
      - teams_workspace_repos:${APP_WORKSPACE_DIR:-/app/workspace}/repos
      - teams_workspace_worktrees:${APP_WORKSPACE_DIR:-/app/workspace}/worktrees
      - ${RUNNER_HOME_DIR:-teams_runner_home}:/home/${APP_USER:-teamsbot}
    security_opt:
      - no-new-privileges:true
    read_only: false

volumes:
  teams_state:
  teams_logs:
  teams_workspace:
  teams_workspace_repos:
  teams_workspace_worktrees:
  teams_home:
  teams_runner_home:
